<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - CityHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-title">CityHub</div>
      <div class="login-subtitle">本地生活，尽在掌握</div>

      <div id="loginForm">
        <div class="form-group">
          <label>手机号</label>
          <input type="tel" id="phone" class="form-control" placeholder="请输入手机号" maxlength="11">
        </div>

        <div class="form-group">
          <label>验证码</label>
          <div class="code-row">
            <input type="text" id="code" class="form-control" placeholder="请输入验证码" maxlength="6">
            <button class="btn btn-outline btn-code" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
          </div>
        </div>

        <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()" style="margin-top:8px;border-radius:8px;">
          登录
        </button>
      </div>

      <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--text-light);">
        登录即表示同意 <a href="#" style="color:var(--primary)">服务条款</a> 和 <a href="#" style="color:var(--primary)">隐私政策</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let countdown = 0
    let timer = null

    function sendCode() {
      const phone = document.getElementById('phone').value.trim()
      if (!/^1\d{10}$/.test(phone)) {
        showToast('请输入正确的手机号', 'error')
        return
      }
      if (countdown > 0) return

      userAPI.sendCode(phone)
        .then(() => {
          showToast('验证码已发送', 'success')
          countdown = 60
          updateCodeBtn()
        })
        .catch((err) => showToast(err.message || '发送失败', 'error'))
    }

    function updateCodeBtn() {
      const btn = document.getElementById('sendCodeBtn')
      if (countdown > 0) {
        btn.textContent = `${countdown}s`
        btn.disabled = true
        countdown--
        timer = setTimeout(updateCodeBtn, 1000)
      } else {
        btn.textContent = '获取验证码'
        btn.disabled = false
      }
    }

    function doLogin() {
      const phone = document.getElementById('phone').value.trim()
      const code = document.getElementById('code').value.trim()

      if (!/^1\d{10}$/.test(phone)) {
        showToast('请输入正确的手机号', 'error')
        return
      }
      if (!code) {
        showToast('请输入验证码', 'error')
        return
      }

      userAPI.login({ phone, code })
        .then((res) => {
          showToast('登录成功', 'success')
          if (res.data) {
            localStorage.setItem('cityhub_token', res.data)
          }
          userAPI.me().then((meRes) => {
            if (meRes.data) {
              setUser(meRes.data)
            }
          }).catch(() => {})
          setTimeout(() => { window.location.href = 'index.html' }, 500)
        })
        .catch((err) => showToast(err.message || '登录失败', 'error'))
    }

    document.getElementById('phone').addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '')
    })
  </script>
</body>
</html>
